<script>
let lessons = {};
let currentLesson = "lesson1";
let index = 0;
let show = false;

fetch("vocab.json")
  .then(res => res.json())
  .then(data => {
    lessons = data;
    loadLesson();
  });

function loadLesson() {
  index = 0;
  loadCard();
}

function loadCard() {
  const word = lessons[currentLesson][index];
  document.getElementById("hanzi").innerText = word.hanzi;
  document.getElementById("pinyin").innerText = show ? word.pinyin : "";
  document.getElementById("meaning").innerText = show ? word.en : "";
}

function flipCard() {
  show = !show;
  loadCard();
}

// 🔊 AUDIO
function playAudio() {
  const word = lessons[currentLesson][index];
  let audio = new Audio(word.audio);
  audio.play();
}

// NEXT
function nextCard() {
  index++;
  show = false;

  if (index >= lessons[currentLesson].length) {
    alert("Lesson done!");
    index = 0;
  }

  loadCard();
}

// CHANGE LESSON
function changeLesson(l) {
  currentLesson = l;
  loadLesson();
}
</script>
