<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HSK App</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin-top: 40px;
}

.card {
  border: 1px solid #ccc;
  padding: 30px;
  display: inline-block;
  cursor: pointer;
}

button {
  margin: 10px;
  padding: 10px 20px;
}
</style>

</head>

<body>

<h2>HSK App</h2>

<!-- LESSON -->
<div>
  <button onclick="changeLesson('lesson1')">Lesson 1</button>
  <button onclick="changeLesson('lesson2')">Lesson 2</button>
  <button onclick="changeLesson('lesson3')">Lesson 3</button>
</div>

<!-- CARD -->
<div class="card" onclick="flipCard()">
  <h1 id="hanzi"></h1>
  <p id="pinyin"></p>
  <p id="meaning"></p>
</div>

<br>

<button onclick="playAudio()">🔊 Play</button>
<button onclick="nextCard()">Next</button>

<script>
let lessons = {};
let currentLesson = "lesson1";
let index = 0;
let show = false;

// LOAD DATA
fetch("./vocab.json")
  .then(res => {
    if (!res.ok) {
      throw new Error("HTTP error " + res.status);
    }
    return res.json();
  })
  .then(data => {
    lessons = data;
    loadLesson();
  })
  .catch(err => {
    console.error("Fetch error:", err);
    alert("Failed to load vocab.json. Check file name & location.");
  });

// LOAD LESSON
function loadLesson() {
  index = 0;
  show = false;
  loadCard();
}

// LOAD CARD
function loadCard() {
  const word = lessons[currentLesson][index];

  document.getElementById("hanzi").innerText = word.hanzi;

  // 👇 Pinyin hiển thị khi click
  document.getElementById("pinyin").innerText =
    show ? word.pinyin : "";

  document.getElementById("meaning").innerText =
    show ? word.en : "";
}

// FLIP CARD
function flipCard() {
  show = !show;
  loadCard();
}

// AUDIO
function playAudio() {
  const word = lessons[currentLesson][index];
  let audio = new Audio(word.audio);
  audio.play();
}

// NEXT
function nextCard() {
  index++;
  show = false;

  if (index >= lessons[currentLesson].length) {
    alert("Lesson done!");
    index = 0;
  }

  loadCard();
}

// CHANGE LESSON
function changeLesson(l) {
  currentLesson = l;
  loadLesson();
}
</script>

</body>
</html>
